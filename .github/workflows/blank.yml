name: Build TikoHD

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Theos
        uses: Randomblock1/theos-action@v1

      - name: Build (release · arm64 + arm64e)
        run: |
          make clean || true
          make package FINALPACKAGE=1

      - name: Collect dylib + deb
        run: |
          mkdir -p out
          cp .theos/obj/TikoHD.dylib out/ 2>/dev/null || find .theos -name 'TikoHD.dylib' -exec cp {} out/ \;
          cp packages/*.deb out/ 2>/dev/null || true
          ls -la out
          test -f out/TikoHD.dylib || { echo "::error::TikoHD.dylib not found — check the build log above"; exit 1; }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TikoHD
          path: out/*
